image: node:latest

stages:
  - deploy

build:
  stage: deploy
  script:
    - npm --version
    - npx --version
    - apt-get update && apt-get install -y wget tar
    - wget https://golang.org/dl/go1.17.2.linux-amd64.tar.gz
    - tar -C /usr/local -xzf go1.17.2.linux-amd64.tar.gz
    - export PATH=$PATH:/usr/local/go/bin
    - go version
  only:
    - main
